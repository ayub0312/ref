<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#eee3cc">
  <title>Reference ID</title>
  <style>
    :root { --ink:#201d17; --faded-ink:rgba(32,29,23,.62); --paper:#eee3cc; --grid:rgba(32,29,23,.15); }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; background:var(--paper); color:var(--ink); font:18px/1.5 Georgia, "Times New Roman", serif; }
    main { width:min(840px, 100%); min-height:100vh; margin:auto; }
    .page { position:relative; min-height:100vh; overflow:hidden; background-color:var(--paper); background-image:linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px); background-size:28px 28px; }
    .page::before { position:absolute; top:0; bottom:0; left:clamp(28px, 7vw, 58px); width:1px; background:rgba(32,29,23,.28); content:""; pointer-events:none; }
    .card { position:relative; z-index:1; padding:clamp(58px, 11vw, 96px) clamp(44px, 12vw, 128px) 26px; text-align:center; }
    h1, .intro, button, #status, .note { font-family:"Bradley Hand", "Noteworthy", "Segoe Print", "Comic Sans MS", cursive; }
    h1 { margin:0 0 3px; font-size:clamp(1.6rem, 5vw, 2.45rem); font-weight:700; letter-spacing:.01em; }
    .intro { margin:0 0 42px; color:var(--faded-ink); font-size:1.05rem; }
    #id { margin:0 0 36px; font:700 clamp(2.7rem, 12vw, 5.2rem)/1 "Courier New", ui-monospace, monospace; letter-spacing:.04em; user-select:all; }
    .actions { display:flex; align-items:center; justify-content:center; gap:22px; }
    button { min-height:42px; cursor:pointer; border:0; padding:7px 2px; color:var(--ink); background:transparent; font-size:1.05rem; font-weight:750; }
    #copy { padding-inline:13px; border:1.5px solid var(--ink); box-shadow:2px 2px 0 var(--ink); }
    #copy:hover { transform:translate(1px, 1px); box-shadow:1px 1px 0 var(--ink); }
    #new { border-bottom:1.5px solid currentColor; }
    #new:hover { font-style:italic; }
    button:focus-visible { outline:2px solid var(--ink); outline-offset:5px; }
    #status { min-height:1.5em; margin:19px 0 0; color:var(--faded-ink); font-size:.94rem; }
    figure { position:relative; z-index:1; width:min(620px, 100%); margin:20px auto 0; padding:0 22px 8px; }
    .note { margin:0 0 2px; color:var(--faded-ink); font-size:.9rem; text-align:right; transform:rotate(-2deg); }
    .scene { display:block; width:100%; height:auto; mix-blend-mode:multiply; }
    @media (max-width:440px) { .card { padding-inline:36px; } .actions { gap:16px; } }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-labelledby="heading">
      <div class="card">
        <h1 id="heading">A little reference</h1>
        <p class="intro">For a thing you would like to find again.</p>
        <output id="id" aria-live="polite" aria-label="Generated reference ID"></output>
        <div class="actions">
          <button id="copy" type="button">Copy ID</button>
          <button id="new" type="button">New ID</button>
        </div>
        <p id="status" aria-live="polite"></p>
      </div>
      <figure>
        <p class="note">keep this somewhere safe</p>
        <img class="scene" src="countryside-pencil.png" alt="A graphite sketch of a grand oak tree, a small barn, a fence, and open countryside.">
      </figure>
    </section>
  </main>
  <script>
    const alphabet = "0123456789ABCDEFGHJKMNPQRSTVWXYZ";
    const length = 6;
    const idOutput = document.querySelector("#id");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copy");

    function makeId() {
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      const id = Array.from(bytes, byte => alphabet[byte & 31]).join("");
      idOutput.value = id;
      idOutput.textContent = id.slice(0, 3) + "-" + id.slice(3);
      status.textContent = "";
      copyButton.textContent = "Copy ID";
    }

    async function copyId() {
      const id = idOutput.value;
      try {
        await navigator.clipboard.writeText(id);
        status.textContent = "Copied to clipboard.";
        copyButton.textContent = "Copied";
      } catch {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(idOutput);
        selection.removeAllRanges();
        selection.addRange(range);
        status.textContent = "Select and copy the ID with ⌘C.";
      }
    }

    document.querySelector("#new").addEventListener("click", makeId);
    copyButton.addEventListener("click", copyId);
    makeId();
  </script>
</body>
</html>
