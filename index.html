<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f6f2e9">
  <title>Reference ID</title>
  <style>
    :root { --ink:#20251f; --muted:#697269; --paper:#f6f2e9; --card:#fffdf8; --line:#deded4; --accent:#176747; --accent-dark:#0d5135; --soft:#dff1e7; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; padding:24px; background:var(--paper); color:var(--ink); font:16px/1.45 ui-rounded, "SF Pro Rounded", "Avenir Next", system-ui, sans-serif; }
    main { width:min(520px, 100%); }
    .card { padding:clamp(26px, 7vw, 46px); background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:0 18px 48px rgba(41,54,43,.09); text-align:center; }
    h1 { margin:0 0 8px; font-size:1.12rem; font-weight:700; letter-spacing:.02em; }
    .intro { margin:0 0 32px; color:var(--muted); }
    #id { margin:0 0 28px; color:var(--accent-dark); font:700 clamp(3rem, 13vw, 5rem)/1 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing:.08em; user-select:all; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    button { min-height:50px; cursor:pointer; border-radius:11px; padding:12px 16px; font:inherit; font-weight:750; }
    #copy { color:#fff; background:var(--accent); border:1px solid var(--accent); }
    #copy:hover { background:var(--accent-dark); }
    #new { color:var(--accent-dark); background:transparent; border:1px solid #9bb7a8; }
    #new:hover { background:var(--soft); }
    button:focus-visible { outline:3px solid #8bd5b2; outline-offset:3px; }
    #status { min-height:1.5em; margin:18px 0 0; color:var(--muted); font-size:.9rem; }
    footer { margin-top:18px; color:var(--muted); font-size:.78rem; text-align:center; }
    @media (max-width:380px) { .actions { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="card" aria-labelledby="heading">
      <h1 id="heading">New reference ID</h1>
      <p class="intro">Six handwritten-friendly characters.</p>
      <output id="id" aria-live="polite" aria-label="Generated reference ID"></output>
      <div class="actions">
        <button id="copy" type="button">Copy ID</button>
        <button id="new" type="button">New ID</button>
      </div>
      <p id="status" aria-live="polite"></p>
    </section>
    <footer>0–9 and A–Z, excluding I, L, O, and U.</footer>
  </main>
  <script>
    const alphabet = "0123456789ABCDEFGHJKMNPQRSTVWXYZ";
    const length = 6;
    const idOutput = document.querySelector("#id");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copy");

    function makeId() {
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      const id = Array.from(bytes, byte => alphabet[byte & 31]).join("");
      idOutput.value = id;
      idOutput.textContent = id;
      status.textContent = "";
      copyButton.textContent = "Copy ID";
    }

    async function copyId() {
      const id = idOutput.value;
      try {
        await navigator.clipboard.writeText(id);
        status.textContent = "Copied to clipboard.";
        copyButton.textContent = "Copied";
      } catch {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(idOutput);
        selection.removeAllRanges();
        selection.addRange(range);
        status.textContent = "Select and copy the ID with ⌘C.";
      }
    }

    document.querySelector("#new").addEventListener("click", makeId);
    copyButton.addEventListener("click", copyId);
    makeId();
  </script>
</body>
</html>
