<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f8eeda">
  <title>Reference ID</title>
  <style>
    :root { --ink:#201d17; --faded-ink:rgba(32,29,23,.62); --paper:#f8eeda; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; background:var(--paper); color:var(--ink); font:18px/1.5 "American Typewriter", "Courier Prime", "Courier New", ui-monospace, monospace; }
    main { width:min(840px, 100%); min-height:100vh; margin:auto; }
    .page { position:relative; min-height:100vh; overflow:hidden; background:var(--paper); }
    .card { position:relative; z-index:1; padding:clamp(58px, 11vw, 96px) clamp(44px, 12vw, 128px) 26px; text-align:center; }
    h1, .intro, button, #status, .method { font-family:inherit; }
    h1 { margin:0 0 7px; font-size:clamp(1.25rem, 4vw, 1.8rem); font-weight:700; letter-spacing:.07em; }
    .intro { margin:0 0 10px; color:var(--faded-ink); font-size:1.05rem; }
    .method { max-width:38rem; margin:0 auto 42px; color:var(--faded-ink); font-size:.82rem; }
    #id { margin:0 0 36px; font:700 clamp(2.7rem, 12vw, 5.2rem)/1 "Courier New", ui-monospace, monospace; letter-spacing:.04em; user-select:all; }
    .actions { display:flex; align-items:center; justify-content:center; gap:22px; }
    button { min-height:42px; cursor:pointer; border:0; padding:7px 2px; color:var(--ink); background:transparent; font-size:1.05rem; font-weight:750; }
    #copy, #new { border-bottom:1.5px solid currentColor; }
    #copy:hover, #new:hover { font-style:italic; }
    button:focus-visible { outline:2px solid var(--ink); outline-offset:5px; }
    #status { min-height:1.5em; margin:19px 0 0; color:var(--faded-ink); font-size:.94rem; }
    figure { position:relative; z-index:1; width:min(620px, 100%); margin:20px auto 0; padding:0 22px 8px; }
    .scene { display:block; width:100%; height:auto; }
    @media (max-width:440px) { .card { padding-inline:36px; } .actions { gap:16px; } }
  </style>
</head>
<body>
  <main>
    <section class="page" aria-labelledby="heading">
      <div class="card">
        <h1 id="heading">Handwritten link generator</h1>
        <p class="intro">for creating references in your paper notebook to contents in your digital notebook e.g. images, hyperlinks, documents</p>
        <p class="method">Uses Crockford Base32, which omits easy-to-confuse letters such as I, L, O, and U—better for writing and reading references by hand.</p>
        <output id="id" aria-live="polite" aria-label="Generated reference ID"></output>
        <div class="actions">
          <button id="copy" type="button">Copy ID</button>
          <button id="new" type="button">New ID</button>
        </div>
        <p id="status" aria-live="polite"></p>
      </div>
      <figure>
        <img class="scene" src="countryside-pencil.png" alt="A graphite sketch of a grand oak tree, a small barn, a fence, and open countryside.">
      </figure>
    </section>
  </main>
  <script>
    const alphabet = "0123456789ABCDEFGHJKMNPQRSTVWXYZ";
    const length = 6;
    const idOutput = document.querySelector("#id");
    const status = document.querySelector("#status");
    const copyButton = document.querySelector("#copy");
    let currentId = "";

    function makeId() {
      const bytes = new Uint8Array(length);
      crypto.getRandomValues(bytes);
      currentId = Array.from(bytes, byte => alphabet[byte & 31]).join("");
      idOutput.textContent = currentId.slice(0, 3) + "-" + currentId.slice(3);
      status.textContent = "";
      copyButton.textContent = "Copy ID";
    }

    async function copyId() {
      const id = currentId;
      try {
        await navigator.clipboard.writeText(id);
        status.textContent = "Copied to clipboard.";
        copyButton.textContent = "Copied";
      } catch {
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(idOutput);
        selection.removeAllRanges();
        selection.addRange(range);
        status.textContent = "Select and copy the ID with ⌘C.";
      }
    }

    document.querySelector("#new").addEventListener("click", makeId);
    copyButton.addEventListener("click", copyId);
    makeId();
  </script>
</body>
</html>
